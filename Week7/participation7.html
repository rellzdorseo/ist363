<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Even Numbers Loop</title>
</head>

<body>
  <script>
   
    function isEven(num) {
      return num % 2 === 0;
    }
 for (let i = 1; i <= 10; i++) {
      if (isEven(i)) {
        console.log(i); 
      }
    }
  </script>
</body>
</html>
