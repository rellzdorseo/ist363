<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monster Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: Verdana, Geneva, Tahoma, sans-serif;
      color: #ffffff;
      text-align: center;
      background: #111;
    }

    .container {
      background-color: #000000;
      padding: 40px;
      border-radius: 20px;
      width: 700px;
      margin: 20px auto;
      position: relative;
    }

    #gameboard, #scoreboard, #playbutton {
      display: flex;
      width: 90%;
      margin: 20px auto;
      align-items: center;
    }

    #gameboard .chars, #scoreboard div, #playbutton button {
      flex: 1;
      text-align: center;
    }

    .chars img {
      width: 100%;
      max-width: 180px;
      border-radius: 12px;
    }

    .fireball {
      flex: 4;
      position: relative;
      height: 200px;
    }

    .fireball img {
      width: 80px;
    }

    #fireballleft {
      position: absolute;
      left: 40px;
      top: 55px;
    }

    #fireballright {
      position: absolute;
      left: 260px;
      top: 55px;
      transform: rotate(180deg);
    }

    .medievalsharp-regular {
      font-family: "MedievalSharp", cursive;
      font-weight: 400;
      font-style: normal;
    }

    button {
      background: linear-gradient(to bottom, #ffbf7f, #ff8000);
      color: white;
      border: 0;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: linear-gradient(to bottom, #ff8000, #ff8000);
    }

    p {
      font-size: 20px;
      font-weight: bold;
      text-align: center;
      width: 100%;
      margin-top: 10px;
    }

    .animate-left { animation: moveRight 0.9s ease-in-out; }
    .animate-right { animation: moveLeft 0.9s ease-in-out; }

    @keyframes moveRight {
      0%   { left: 40px; opacity: 1; }
      50%  { left: 150px; opacity: 1; }
      100% { left: 260px; opacity: 0.9; }
    }

    @keyframes moveLeft {
      0%   { left: 260px; opacity: 1; }
      50%  { left: 150px; opacity: 1; }
      100% { left: 40px; opacity: 0.9; }
    }

    #result {
      color: #ffe066;
      min-height: 28px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1 class="medievalsharp-regular">Fireball Duel</h1>

    <div id="gameboard">
      <div class="chars">
        <img src="images/monster.jpg" alt="monster" id="monster">
      </div>

      <div class="fireball">
        <img src="images/fireball.gif" alt="fireball" id="fireballleft">
        <img src="images/fireball.gif" alt="fireball" id="fireballright">
      </div>

      <div class="chars">
        <img src="images/girl.jpg" alt="girl" id="girl">
      </div>
    </div>

    <div id="scoreboard">
      <div>Monster Shield: <span id="mscore">100</span>%</div>
      <div>Girl Shield: <span id="gscore">100</span>%</div>
    </div>

    <div id="playbutton">
      <button id="throwBtn">Throw Fireball</button>
    </div>

    <p id="result"></p>
  </div>

  <script>
    let monsterShield = 100;
    let girlShield = 100;
    let gameOver = false;

    const monsterImg = document.querySelector("#monster");
    const girlImg = document.querySelector("#girl");
    const mscoreEl = document.querySelector("#mscore");
    const gscoreEl = document.querySelector("#gscore");
    const throwBtn = document.querySelector("#throwBtn");
    const resultEl = document.querySelector("#result");
    const playButtonDiv = document.querySelector("#playbutton");

    const boomPath = "/Week8/images/boom.png";

    throwBtn.addEventListener("click", playGame);

    function animateFireball() {
      const leftBall = document.getElementById("fireballleft");
      const rightBall = document.getElementById("fireballright");

      leftBall.classList.remove("animate-left");
      rightBall.classList.remove("animate-right");

      // force animation restart
      void leftBall.offsetWidth;
      void rightBall.offsetWidth;

      leftBall.classList.add("animate-left");
      rightBall.classList.add("animate-right");
    }

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function playGame() {
      if (gameOver) return;

      animateFireball();

      // save previous shield values
      const prevMonster = monsterShield;
      const prevGirl = girlShield;

      // random damage
      const monsterThrow = randomInt(1, 20); // hits girl
      const girlThrow = randomInt(1, 20);    // hits monster

      // apply damage
      monsterShield -= girlThrow;
      girlShield -= monsterThrow;

      // update displayed scores
      mscoreEl.innerText = Math.max(monsterShield, 0);
      gscoreEl.innerText = Math.max(girlShield, 0);

      // detect who got defeated THIS round
      const monsterDefeatedNow = (prevMonster > 0 && monsterShield <= 0);
      const girlDefeatedNow = (prevGirl > 0 && girlShield <= 0);

      // if both defeated in same click, choose who "lost first"
      // rule: whoever ends lower (more negative) is treated as defeated first
      if (monsterDefeatedNow && girlDefeatedNow) {
        if (monsterShield < girlShield) {
          monsterImg.src = boomPath;
          endGame("Monster was defeated first! Girl won!");
        } else if (girlShield < monsterShield) {
          girlImg.src = boomPath;
          endGame("Girl was defeated first! Monster won!");
        } else {
          // exact tie
          monsterImg.src = boomPath;
          endGame("Tie! Monster was marked defeated first.");
        }
        return;
      }

      // only one defeated
      if (monsterDefeatedNow) {
        monsterImg.src = boomPath;
        endGame("Monster lost! Girl won!");
        return;
      }

      if (girlDefeatedNow) {
        girlImg.src = boomPath;
        endGame("Girl lost! Monster won!");
        return;
      }

      // keep playing
      resultEl.innerText = `Monster hit: ${monsterThrow} | Girl hit: ${girlThrow}`;
    }

    function endGame(message) {
      gameOver = true;
      resultEl.innerText = message;
      playButtonDiv.innerHTML = "";
    }
  </script>
</body>
</html>
